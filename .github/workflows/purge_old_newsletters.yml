name: Purge Old Newsletters

on:
  schedule:
    - cron: "0 3 1 * *" # monthly on the 1st at 3 AM UTC

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: purge-old-newsletters
  cancel-in-progress: false

jobs:
  purge_old_newsletters:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Purge newsletters older than 18 months
        run: python .github/scripts/purge_old_newsletters.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

          git add tldr/

          # Check if there are changes before committing
          if git diff --cached --quiet; then
            echo "No old newsletters to purge, exiting cleanly."
            exit 0
          fi

          git commit -m "Purge newsletters older than 18 months"
          git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git main
