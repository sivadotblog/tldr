name: Archive Newsletters

on:
  schedule:
    - cron: "0,30 10-12 * * 1-5" # 6-8:30 AM EDT / 5-7:30 AM EST, Mon-Fri
    - cron: "0 13 * * 1-5"       # 9 AM EDT / 8 AM EST, Mon-Fri

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archive-newsletters
  cancel-in-progress: false

jobs:
  archive_newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Archive tech newsletter
        uses: ./.github/actions/tldr_archive
        with:
          date: $(date -d "today" '+%Y-%m-%d')
          category: tech
          repo: ${{ github.repository }}
          gh_token: ${{ secrets.GH_TOKEN }}

      - name: Archive devops newsletter
        uses: ./.github/actions/tldr_archive
        with:
          date: $(date -d "today" '+%Y-%m-%d')
          category: devops
          repo: ${{ github.repository }}
          gh_token: ${{ secrets.GH_TOKEN }}

      - name: Archive data newsletter
        uses: ./.github/actions/tldr_archive
        with:
          date: $(date -d "today" '+%Y-%m-%d')
          category: data
          repo: ${{ github.repository }}
          gh_token: ${{ secrets.GH_TOKEN }}

      - name: Archive ai newsletter
        uses: ./.github/actions/tldr_archive
        with:
          date: $(date -d "today" '+%Y-%m-%d')
          category: ai
          repo: ${{ github.repository }}
          gh_token: ${{ secrets.GH_TOKEN }}

      - name: Archive infosec newsletter
        uses: ./.github/actions/tldr_archive
        with:
          date: $(date -d "today" '+%Y-%m-%d')
          category: infosec
          repo: ${{ github.repository }}
          gh_token: ${{ secrets.GH_TOKEN }}

      - name: Trigger deploy workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"newsletters_archived"}'
